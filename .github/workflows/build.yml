name: Build Baiak Thunder

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
      
    - name: Install CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.20.x'
        
    - name: Install Boost C++ Libraries
      run: |
        # Download Boost 1.75.0 (compatible with TFS 1.5)
        curl -L -o boost.7z https://sourceforge.net/projects/boost/files/boost/1.75.0/boost_1_75_0.7z/download
        7z x boost.7z -oC:\
        move C:\boost_1_75_0 C:\boost
        echo "BOOST_ROOT=C:\boost" >> $env:GITHUB_ENV
        echo "C:\boost" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
    - name: Setup vcpkg (for additional dependencies)
      run: |
        git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat
        # Install common TFS dependencies
        C:\vcpkg\vcpkg install lua:x64-windows pugixml:x64-windows gmp:x64-windows mariadb:x64-windows
        
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 `
          -DBOOST_ROOT="C:\boost" `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DUSE_MYSQL=ON `
          -DUSE_MARIADB=ON
      shell: pwsh
      
    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel
      shell: pwsh
      
    - name: Copy DLLs
      run: |
        # Copy necessary DLLs to the build output directory
        if (Test-Path "build\Release\theforgottenserver.exe") {
          mkdir artifacts -ErrorAction SilentlyContinue
          copy build\Release\theforgottenserver.exe artifacts\
          copy C:\vcpkg\installed\x64-windows\bin\*.dll artifacts\ -ErrorAction SilentlyContinue
          copy C:\boost\stage\lib\*.dll artifacts\ -ErrorAction SilentlyContinue
        }
      shell: pwsh
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: theforgottenserver-x64
        path: artifacts/theforgottenserver.exe
        retention-days: 30
        
    - name: Upload Complete Package (with DLLs)
      uses: actions/upload-artifact@v4
      with:
        name: theforgottenserver-x64-complete
        path: artifacts/
        retention-days: 30
