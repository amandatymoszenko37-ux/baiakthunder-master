name: Build Baiak Thunder
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
      
    - name: Install CMake
      uses: jwlawson/actions-setup-cmake@v2
      
    - name: Setup vcpkg binary cache
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('VCPKG_BINARY_SOURCES', 'clear;x-gha,readwrite')
          core.exportVariable('VCPKG_DOWNLOADS', process.env.GITHUB_WORKSPACE + '\\vcpkg-downloads')

    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          C:\vcpkg
          vcpkg-downloads
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-build-${{ hashFiles('**/*.cpp', '**/*.h', '**/CMakeLists.txt', 'vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Setup vcpkg
      shell: cmd
      run: |
        if not exist C:\vcpkg git clone --depth=1 https://github.com/Microsoft/vcpkg.git C:\vcpkg
        if exist C:\vcpkg\bootstrap-vcpkg.bat call C:\vcpkg\bootstrap-vcpkg.bat

    - name: Install Dependencies via vcpkg.json
      shell: cmd
      run: |
        C:\vcpkg\vcpkg install --triplet x64-windows --x-manifest-root=%GITHUB_WORKSPACE%
        
    - name: Configure CMake
      shell: cmd
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        
    - name: Build Server
      shell: cmd
      run: |
        cd build
        cmake --build . --config Release
        
    - name: Upload Finished Executable
      uses: actions/upload-artifact@v4
      with:
        name: updated-server
        path: build/Release/theforgottenserver.exe
