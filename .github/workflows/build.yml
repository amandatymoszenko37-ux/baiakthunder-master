name: Build Baiak Thunder

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Install CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: '3.28.1'

    - name: Install Dependencies Directly
      shell: cmd
      run: |
        "C:\vcpkg\vcpkg.exe" install boost cryptopp gmp libmariadb luajit pugixml --triplet=x64-windows
        "C:\vcpkg\vcpkg.exe" install fmt:x64-windows --version=10.2.1 2>nul || "C:\vcpkg\vcpkg.exe" install fmt --triplet=x64-windows

    - name: Configure CMake
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
      shell: powershell

    - name: Build Server
      run: |
        cmake --build build --config Release
      shell: powershell

    - name: Upload Finished Executable
      uses: actions/upload-artifact@v4
      with:
        name: theforgottenserver-windows
        path: build/Release/theforgottenserver.exe
