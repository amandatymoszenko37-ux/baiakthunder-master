name: Build Baiak Thunder

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Install CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: '3.28.1'

    - name: Cache vcpkg & Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg
          ${{ github.workspace }}/vcpkg_cache
        key: ${{ runner.os }}-vcpkg-manual-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-manual-

    - name: Setup vcpkg and Install Dependencies
      run: |
        if (-not (Test-Path "${{ github.workspace }}/vcpkg/vcpkg.exe")) {
          git clone https://github.com/Microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
          cd ${{ github.workspace }}/vcpkg
          git checkout 3426db05b996481ca31e95fff3734cf23e0f51bc
          .\bootstrap-vcpkg.bat
        }
        cd ${{ github.workspace }}
        & "${{ github.workspace }}\vcpkg\vcpkg.exe" install --triplet=x64-windows --x-manifest-root="${{ github.workspace }}" --x-feature-versions
      shell: powershell

    - name: Configure CMake
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
      shell: powershell

    - name: Build Server
      run: |
        cmake --build build --config Release
      shell: powershell

    - name: Upload Finished Executable
      uses: actions/upload-artifact@v4
      with:
        name: theforgottenserver-windows
        path: build/Release/theforgottenserver.exe
